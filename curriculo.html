<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Currículo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0a0f1c,#001f3f);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.box{
width:100%;
max-width:420px;
padding:20px;
background:rgba(255,255,255,0.05);
border-radius:15px;
box-shadow:0 0 25px rgba(0,200,255,0.4);
}

h2{text-align:center;margin-bottom:10px;}

input, textarea{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:#fff;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

#preview{
margin-top:20px;
background:#fff;
color:#000;
padding:15px;
border-radius:10px;
}

a{
display:block;
margin-top:10px;
text-align:center;
color:#aaa;
text-decoration:none;
}
</style>
</head>

<body>

<div class="box">
<h2>📄 Criar Currículo</h2>

<input id="nome" placeholder="Seu nome">
<input id="profissao" placeholder="Profissão">
<textarea id="experiencia" placeholder="Experiência"></textarea>

<button onclick="gerar()">Gerar Currículo</button>

<div id="preview"></div>

<a href="index.html">⬅ Voltar</a>
</div>

<script>
function gerar(){
let nome=document.getElementById("nome").value;
let profissao=document.getElementById("profissao").value;
let experiencia=document.getElementById("experiencia").value;

document.getElementById("preview").innerHTML=`
<h3>${nome}</h3>
<p><b>Profissão:</b> ${profissao}</p>
<p><b>Experiência:</b><br>${experiencia}</p>
`;
}
</script>

</body>
</html>
